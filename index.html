<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ピタゴラスの五度圏 3D</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 10px 20px;
      background: #1a1d27;
      border-bottom: 1px solid #2a2d3e;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 17px;
      font-weight: 600;
      color: #7c9ff5;
      white-space: nowrap;
    }

    .header-sep {
      width: 1px;
      height: 24px;
      background: #2a2d3e;
    }

    /* View buttons */
    .view-group {
      display: flex;
      gap: 6px;
    }
    .view-btn {
      padding: 5px 14px;
      background: #1e2233;
      border: 1px solid #2e3348;
      border-radius: 4px;
      color: #9ba3c0;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .view-btn:hover { background: #252a40; color: #c5cde0; border-color: #3d6cf5; }

    /* Animation controls */
    .anim-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    #anim-btn {
      padding: 7px 16px;
      background: #1e4a2a;
      color: #4ade80;
      border: 1px solid #2d6b40;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #anim-btn:hover { background: #255c34; }

    #stop-btn {
      padding: 7px 16px;
      background: #4a1e1e;
      color: #f87171;
      border: 1px solid #6b2d2d;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: none;
      white-space: nowrap;
    }
    #stop-btn:hover { background: #5c2525; }

    .speed-group {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #6b7a99;
    }
    .speed-group input[type=range] {
      width: 80px;
      accent-color: #3d6cf5;
      height: 4px;
    }
    .speed-group span.val { min-width: 30px; color: #a8b8d8; font-size: 11px; }

    /* Main area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #plot {
      flex: 1;
    }

    /* Stats bar */
    .stats-bar {
      padding: 5px 16px;
      background: #1a1d27;
      border-top: 1px solid #2a2d3e;
      font-size: 12px;
      color: #6b7a99;
      display: flex;
      gap: 16px;
    }
    .stats-bar span b { color: #a8b8d8; }
  </style>
</head>
<body>

<header>
  <h1>ピタゴラスの五度圏 3D</h1>

  <div class="header-sep"></div>

  <div class="view-group">
    <button class="view-btn" id="view-top">↑ 上から</button>
    <button class="view-btn" id="view-side">→ 横から</button>
    <button class="view-btn" id="view-default">⟳ リセット</button>
  </div>

  <div class="anim-group">
    <div class="speed-group">
      <span>遅</span>
      <input type="range" id="anim-speed" min="100" max="1500" value="700" step="100">
      <span>速</span>
      <span class="val" id="speed-label">0.7s</span>
    </div>
    <button id="anim-btn">◉ アニメ</button>
    <button id="stop-btn">■ 停止</button>
  </div>
</header>

<div class="main">
  <div id="plot"></div>
  <div class="stats-bar">
    <span>点数: <b id="stat-count">0</b></span>
    <span>X: <b id="stat-x">—</b></span>
    <span>Y: <b id="stat-y">—</b></span>
    <span>Z: <b id="stat-z">—</b></span>
  </div>
</div>

<script>
// ─── Layout helpers ────────────────────────────────────────────
function currentCamera() {
  return document.getElementById('plot')._fullLayout?.scene?.camera ?? null;
}

function buildLayout(camera) {
  return {
    paper_bgcolor: '#0f1117',
    plot_bgcolor: '#0f1117',
    margin: { l: 0, r: 0, t: 0, b: 0 },
    scene: {
      xaxis: axisStyle('X'),
      yaxis: axisStyle('Y'),
      zaxis: axisStyle('Z'),
      bgcolor: '#0f1117',
      ...(camera ? { camera } : {})
    },
    uirevision: 'keep'
  };
}

function axisStyle(title) {
  return {
    title: { text: title, font: { color: '#7c9ff5', size: 13 } },
    color: '#4a5568',
    gridcolor: '#1e2a3a',
    zerolinecolor: '#2d3a4a',
    tickfont: { color: '#6b7a99', size: 10 }
  };
}

// ─── Pythagorean tuning data ───────────────────────────────────
const logAng = Z => Math.log2(Z / 440) * 2 * Math.PI;
const angHue = ang => ((ang % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI) / (2*Math.PI) * 360;
const blueOf = n => 'hsl(220,90%,' + Math.round(75 - n * 4.5) + '%)';
const redOf  = n => 'hsl(0,90%,'   + Math.round(75 - n * 4.5) + '%)';
const N_MAX = 12;

function buildHelixTrace() {
  const hX=[], hY=[], hZ=[], hC=[];
  for (let i = 0; i <= 3000; i++) {
    const Z = 440 * Math.pow(2, Math.log2(1400/440) * i / 3000);
    const ang = logAng(Z);
    hX.push(Math.cos(ang)); hY.push(Math.sin(ang)); hZ.push(Z);
    hC.push('hsl(' + Math.round(angHue(ang)) + ',90%,55%)');
  }
  return { type:'scatter3d', mode:'markers', name:'円柱螺旋',
    x:hX, y:hY, z:hZ, marker:{ color:hC, size:2, opacity:0.9 } };
}

function buildPythagoreanTraces() {
  let a = 440;
  const seq = [];
  for (let n = 0; n <= N_MAX; n++) {
    const halved = a > 880;
    const b = halved ? a / 2 : a;
    seq.push({ n, b, a, halved });
    a = b * 3 / 2;
  }

  const pyth=[], ghost=[], conn=[], path=[];
  for (const { n, b, a: an, halved } of seq) {
    const ang_b = logAng(b);
    const ang_a = logAng(an);
    pyth.push({ x: Math.cos(ang_b), y: Math.sin(ang_b), z: b, color: blueOf(n) });
    if (halved) {
      ghost.push({ x: Math.cos(ang_a), y: Math.sin(ang_a), z: an, color: redOf(n) });
      conn.push(
        { x: Math.cos(ang_a), y: Math.sin(ang_a), z: an, color: redOf(n) },
        { x: Math.cos(ang_b), y: Math.sin(ang_b), z: b,  color: redOf(n) },
        null
      );
    }
    if (n < N_MAX) {
      const a_next = b * 3 / 2;
      const ang_next = logAng(a_next);
      path.push(
        { x: Math.cos(ang_b),    y: Math.sin(ang_b),    z: b },
        { x: Math.cos(ang_next), y: Math.sin(ang_next), z: a_next },
        null
      );
    }
  }

  const mk = (pts, sz) => {
    const xs=[], ys=[], zs=[], cs=[];
    for (const p of pts) {
      if (!p) { xs.push(null); ys.push(null); zs.push(null); cs.push(null); continue; }
      xs.push(p.x); ys.push(p.y); zs.push(p.z); cs.push(p.color ?? null);
    }
    return { xs, ys, zs, cs };
  };

  const p = mk(pyth);
  const g = mk(ghost);
  const c = mk(conn);
  const s = mk(path);

  return [
    { type:'scatter3d', mode:'markers', name:'b(n) 青系',
      x:p.xs, y:p.ys, z:p.zs, marker:{ color:p.cs, size:8, opacity:0.9 } },
    { type:'scatter3d', mode:'markers', name:'a(n) 赤系',
      x:g.xs, y:g.ys, z:g.zs, marker:{ color:g.cs, size:8, opacity:0.9 } },
    { type:'scatter3d', mode:'lines', name:'÷2（破線）',
      x:c.xs, y:c.ys, z:c.zs, line:{ color:'rgba(255,180,60,0.8)', width:2, dash:'dash' } },
    { type:'scatter3d', mode:'lines', name:'×3/2（実線）',
      x:s.xs, y:s.ys, z:s.zs, line:{ color:'rgba(200,200,200,0.6)', width:1.5 } }
  ];
}

// ─── Init plot ─────────────────────────────────────────────────
function initPlot() {
  const helix = buildHelixTrace();
  const pyth  = buildPythagoreanTraces();
  const traces = [helix, ...pyth];
  Plotly.newPlot('plot', traces, buildLayout(), { responsive: true, displayModeBar: true });

  document.getElementById('plot').on('plotly_hover', (data) => {
    if (!data.points.length) return;
    const p = data.points[0];
    document.getElementById('stat-x').textContent = p.x.toFixed(4);
    document.getElementById('stat-y').textContent = p.y.toFixed(4);
    document.getElementById('stat-z').textContent = p.z.toFixed(4);
  });

  const total = traces.reduce((s, t) => s + (t.x?.filter(v => v !== null).length ?? 0), 0);
  document.getElementById('stat-count').textContent = total.toLocaleString();
}

// ─── View buttons ──────────────────────────────────────────────
const setCamera = eye => Plotly.relayout('plot', {'scene.camera': { eye, up: {x:0,y:0,z:1} }});
document.getElementById('view-top').addEventListener('click',     () => setCamera({x:0,   y:0,   z:2.5}));
document.getElementById('view-side').addEventListener('click',    () => setCamera({x:2.5, y:0,   z:0.1}));
document.getElementById('view-default').addEventListener('click', () => setCamera({x:1.5, y:1.5, z:1.2}));

// ─── Animation ─────────────────────────────────────────────────
let animRunning = false;
let animCancelFn = null;

function stopAnimation() {
  animRunning = false;
  if (animCancelFn) { animCancelFn(); animCancelFn = null; }
  document.getElementById('anim-btn').style.display = '';
  document.getElementById('stop-btn').style.display = 'none';
}

async function startAnimation() {
  if (animRunning) return;
  animRunning = true;
  document.getElementById('anim-btn').style.display = 'none';
  document.getElementById('stop-btn').style.display = 'block';

  const delay = () => parseInt(document.getElementById('anim-speed').value);
  const sleep = ms => new Promise(r => {
    const id = setTimeout(r, ms);
    animCancelFn = () => { clearTimeout(id); r(); };
  });

  let a = 440;
  const seq = [];
  for (let n = 0; n <= N_MAX; n++) {
    const b = a > 880 ? a / 2 : a;
    seq.push({ n, b, a_raw: a });
    a = b * 3 / 2;
  }

  const cam = currentCamera();
  const helixTrace = buildHelixTrace();

  // Initialize: helix + 4 empty placeholder traces (indices 1-4)
  // All subsequent updates use Plotly.restyle() which never touches the layout/camera
  Plotly.react('plot', [
    helixTrace,
    { type:'scatter3d', mode:'markers', name:'b(n) 青系',  x:[], y:[], z:[], marker:{color:[], size:8, opacity:0.9} },
    { type:'scatter3d', mode:'markers', name:'a(n) 赤系',  x:[], y:[], z:[], marker:{color:[], size:8, opacity:0.9} },
    { type:'scatter3d', mode:'lines',   name:'÷2（破線）', x:[], y:[], z:[], line:{color:'rgba(255,180,60,0.8)', width:2, dash:'dash'} },
    { type:'scatter3d', mode:'lines',   name:'×3/2（実線）',x:[], y:[], z:[], line:{color:'rgba(200,200,200,0.6)', width:1.5} }
  ], buildLayout(cam));

  const pX=[], pY=[], pZ=[], pC=[];
  const gX=[], gY=[], gZ=[], gC=[];
  const cX=[], cY=[], cZ=[];
  const sX=[], sY=[], sZ=[];

  const redraw = () => {
    Plotly.restyle('plot', { x:[[...pX]], y:[[...pY]], z:[[...pZ]], 'marker.color':[[...pC]] }, [1]);
    Plotly.restyle('plot', { x:[[...gX]], y:[[...gY]], z:[[...gZ]], 'marker.color':[[...gC]] }, [2]);
    Plotly.restyle('plot', { x:[[...cX]], y:[[...cY]], z:[[...cZ]] }, [3]);
    Plotly.restyle('plot', { x:[[...sX]], y:[[...sY]], z:[[...sZ]] }, [4]);
  };
  await sleep(800);

  for (const { n, b, a_raw } of seq) {
    if (!animRunning) break;
    const ang_b  = logAng(b);
    const ang_a  = logAng(a_raw);
    const halved = a_raw > 880;

    pX.push(Math.cos(ang_b)); pY.push(Math.sin(ang_b)); pZ.push(b); pC.push(blueOf(n));
    redraw();
    await sleep(delay());
    if (!animRunning) break;

    if (n < N_MAX) {
      const a_next   = b * 3 / 2;
      const ang_next = logAng(a_next);
      sX.push(Math.cos(ang_b), Math.cos(ang_next), null);
      sY.push(Math.sin(ang_b), Math.sin(ang_next), null);
      sZ.push(b, a_next, null);
      redraw();
      await sleep(delay());
      if (!animRunning) break;

      if (a_next > 880) {
        const b_next   = a_next / 2;
        const ang_anxt = logAng(a_next);
        const ang_bnxt = logAng(b_next);
        gX.push(Math.cos(ang_anxt)); gY.push(Math.sin(ang_anxt));
        gZ.push(a_next); gC.push(redOf(n + 1));
        redraw();
        await sleep(delay());
        if (!animRunning) break;

        cX.push(Math.cos(ang_anxt), Math.cos(ang_bnxt), null);
        cY.push(Math.sin(ang_anxt), Math.sin(ang_bnxt), null);
        cZ.push(a_next, b_next, null);
        redraw();
        await sleep(delay());
        if (!animRunning) break;
      }
    }
  }

  animRunning = false;
  animCancelFn = null;
  document.getElementById('anim-btn').style.display = '';
  document.getElementById('stop-btn').style.display = 'none';
}

document.getElementById('anim-btn').addEventListener('click', startAnimation);
document.getElementById('stop-btn').addEventListener('click', stopAnimation);
document.getElementById('anim-speed').addEventListener('input', e => {
  document.getElementById('speed-label').textContent = (e.target.value / 1000).toFixed(1) + 's';
});

// ─── Start ─────────────────────────────────────────────────────
initPlot();
</script>
</body>
</html>
